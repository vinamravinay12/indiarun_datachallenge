sandbox_link: "https://colab.research.google.com/github/vinamravinay12/indiarun_datachallenge/blob/main/sandbox/sandbox_demo.ipynb"
# REQUIRED by the portal. A working hosted env (HuggingFace Spaces / Streamlit Cloud /
# Replit / Colab / Binder) where rank.py can run on a small candidate sample.
# This is a Colab notebook (sandbox/sandbox_demo.ipynb) that runs the pipeline on a sample.

reproduce_command: "python rank.py --candidates ./data/candidates.jsonl --out ./submission.csv"
# The single command that produces submission.csv (spec Section 10.3). CPU-only, no network, ~34s.

# --- Pre-computation (documented per spec Section 10.3) -------------------------------------
precompute_required: true
precompute_command: "python precompute.py --candidates ./data/candidates.jsonl --artifacts ./artifacts"
precompute_note: |
  This system uses ONE offline pre-computation step. precompute.py encodes each candidate's
  career prose and the JD with bge-small-en-v1.5 into cached embeddings
  (artifacts/cand_emb_256.npy, cand_ids.json, jd_emb_256.npy).
  Pre-computation runs once, may use a GPU/MPS, and may exceed the 5-minute window - this is
  explicitly permitted by the spec.
  The ranking step that produces the CSV (rank.py) then only LOADS these arrays and runs a
  dot-product blend: it completes in ~34s on CPU with no network, well within the 5-minute
  budget. On a fresh clone, run precompute.py once, then rank.py.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "MacBook (Apple Silicon)"
  cpu_cores: 12
  ram_gb: 24                          # ranking step stays well under the 16 GB limit
  python_version: "3.13.9"
  os: "macOS 26.6"
  uses_gpu_for_inference: false        # rank.py is CPU-only; MPS used only for offline precompute
  has_network_during_ranking: false    # no API/model calls during ranking
  pre_computation_required: true        # bge-small embeddings are precomputed offline
  pre_computation_time_minutes: 5       # approx, encoding 100k candidates on Apple MPS

