# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"        # architecture, scoring design, code review, the .py reproducer
  - "Other"         # OpenAI Codex CLI — weight tuning, candidate spot-checks

ai_usage_summary: |
  Claude (Claude Code) was used as a pair-engineer for architecture discussion, scoring design,
  honeypot-detection strategy, and turning the notebooks into the reproducible rank.py pipeline.
  OpenAI Codex CLI was used for some weight tuning and adversarial candidate spot checks. All design
  decisions, thresholds, and trade offs were reviewed and chosen by the author; no candidate data was
  sent to any hosted LLM during the ranking step (it runs offline on CPU).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid ranker: structured evidence gates domain fit, an embedding model fine-ranks, and
  behavioral/logistics signals modulate availability. Structured scoring uses explicit JD-derived
  weights (experience band peaking at 6-8 yrs, production retrieval/vector/eval evidence, verified
  assessment, product-company context, graded location) plus hard disqualifiers (consulting-only,
  CV without NLP, pure research without production, title vs work mismatch) and anti-fit penalties.
  Semantic fit is bge-small cosine of the JD against each candidate's career prose (not the noisy
  skill list), which is the decisive signal against keyword stuffer traps. A 6 signal behavioral
  multiplier down-weights unavailable candidates, while an experience multiplier peaks at the JD's
  ideal 6-8 year band and keeps 5-9 years as the target range. ~80 honeypots are removed up front
  via an impossibility battery (skill/tool anachronisms, impossible tenure, company-founded-after
  dates, expert-skill-with-zero-months); 0 reach the top-100. Final = 0.75*structured +
  0.25*semantic, scaled by behavioral x logistics x experience, with an assessment-quality
  refinement over a top-150 shortlist.

