  - "Codex"         # OpenAI Codex CLI - weight tuning, candidate spot-checks

ai_usage_summary: |
  Claude (Claude Code) was used as a pair-engineer for architecture discussion, scoring design,
  honeypot-detection strategy, and turning the notebooks into the reproducible rank.py pipeline.
  OpenAI Codex CLI was used for some weight tuning and adversarial candidate spot checks. All design
  decisions, thresholds, and trade offs were reviewed and chosen by the author; no candidate data was
  sent to any hosted LLM during the ranking step (it runs offline on CPU).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid ranker: structured evidence gates domain fit, an embedding model fine-ranks, and
  behavioral/logistics signals modulate availability. Structured scoring uses explicit JD-derived
  weights (experience band peaking at 6-8 yrs, production retrieval/vector/eval evidence, verified
  assessment, product-company context, graded location) plus hard disqualifiers (consulting-only,
  CV without NLP, pure research without production, title vs work mismatch) and anti-fit penalties.
  Skill evidence is scored with DEPTH bonuses on top of the strong/flat tiers so deeper demonstrated
  retrieval/eval/vector proof keeps earning score instead of saturating - a candidate who has
  genuinely built more ranking/retrieval systems outranks one who merely clears the bar, so skill
  depth beats raw tenure at the margin. Semantic fit is bge-small cosine of the JD against each
  candidate's career prose (not the noisy skill list), which is the decisive signal against keyword
  stuffer traps. A 6-signal behavioral multiplier down-weights unavailable/passive candidates (low
  recruiter response, not open to work, long inactivity). Logistics = graded location x notice: the
  location grade is unchanged (JD city > willing-to-relocate > secondary tier-1 > penalized), and the
  notice-period grade prefers <=30 days, treats 31-60 days as acceptable (notice buyout is standard
  in India), and penalizes >60 days UNLESS the candidate is exceptional on skills/struct/semantic
  fit, in which case the penalty is eased (worth the wait or a buyout). An experience multiplier
  keeps 5-9 years as the target with a light 6-8 peak but is deliberately NOT the tiebreaker. ~80
  honeypots are removed up front via an impossibility battery (skill/tool anachronisms, impossible
  tenure, company-founded-after dates, expert-skill-with-zero-months); 0 reach the top-100.
  base = (0.75*structured + 0.25*semantic) x behavioral x logistics x experience; the final score
  over a top-150 shortlist is 0.85*normalized(base) + 0.15*assessment-quality refinement.

